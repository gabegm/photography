name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to deploy Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build
        # Pass the Pages base path so Astro generates correct asset URLs.
        # actions/configure-pages sets GITHUB_PAGES_BASE_URL automatically.
        run: npm run build
        env:
          # Used by astro.config.mjs to set `base` for sub-path deployments
          # e.g. https://gabegm.github.io/jamiegenovese/ → base = /jamiegenovese
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
